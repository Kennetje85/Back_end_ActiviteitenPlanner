name: Activiteitenplanner CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ASPNETCORE_ENVIRONMENT: 'Production'
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'Activiteitenplanner'
  AZURE_RESOURCE_GROUP: 'REDACTED_RESOURCE_GROUP'
  PUBLISH_DIR: 'publish'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find solution file
        id: find_sln
        run: |
          echo "Searching for first .sln in repository..."
          SOL=$(find . -maxdepth 4 -name '*.sln' -print -quit)
          if [ -z "$SOL" ]; then
            echo "No .sln found in repository"
            exit 1
          fi
          echo "Found solution: $SOL"
          echo "SOLUTION_PATH=$SOL" >> $GITHUB_ENV

      - name: Show discovered paths (debug)
        run: |
          echo "SOLUTION_PATH = $SOLUTION_PATH"
          ls -la

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: dotnet build "$SOLUTION_PATH" --configuration Release --no-restore

      - name: Test
        run: dotnet test "$SOLUTION_PATH" --configuration Release --no-build --verbosity normal

      - name: Publish web project
        working-directory: Backend_ActiviteitenPlanner
        run: dotnet publish Backend_ActiviteitenPlanner.csproj -c Release -o ${{ env.PUBLISH_DIR }} /p:UseAppHost=false

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: Backend_ActiviteitenPlanner/${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: Backend_ActiviteitenPlanner/${{ env.PUBLISH_DIR }}