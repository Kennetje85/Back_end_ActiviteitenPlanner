name: Activiteitenplanner CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: 'Activiteitenplanner'
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_PACKAGE_PATH: './Backend_ActiviteitenPlanner/publish'
  API_PROTECTION_PATH: './Backend_ActiviteitenPlanner/publish'
  SOLUTION_PATH: 'Backend_ActiviteitenPlanner.sln'
  AZURE_RESOURCE_GROUP: 'REDACTED_RESOURCE_GROUP'
  PUBLISH_DIR: 'publish'

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration ${{ env.BUILD_CONFIGURATION || 'Release' }} --no-restore

      - name: Test
        run: dotnet test "${{ env.SOLUTION_PATH }}" --configuration ${{ env.BUILD_CONFIGURATION || 'Release' }} --no-build --verbosity normal

      - name: Publish web project
        working-directory: Backend_ActiviteitenPlanner
        run: dotnet publish Backend_ActiviteitenPlanner.csproj -c ${{ env.BUILD_CONFIGURATION || 'Release' }} -o ${{ env.PUBLISH_DIR }} /p:UseAppHost=false

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: Backend_ActiviteitenPlanner/${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: Backend_ActiviteitenPlanner/${{ env.PUBLISH_DIR }}